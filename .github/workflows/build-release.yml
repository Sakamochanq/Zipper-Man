name: Build and Release

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - '.github/workflows/build-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1
      
      - name: Restore NuGet packages
        run: nuget restore src/Zipper-Man.sln
      
      - name: Build solution
        run: msbuild src/Zipper-Man.sln /p:Configuration=Release /p:Platform="Any CPU"
      
      - name: Get version from AssemblyInfo
        id: version
        run: |
          $content = Get-Content -Path "src/Zipper-Man/Properties/AssemblyInfo.cs" -Raw
          if ($content -match 'AssemblyVersion\("([^"]+)"\)') {
            $version = $matches[1]
            echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          } else {
            $version = "1.0.0"
            echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          }
      
      - name: Prepare release assets
        run: |
          mkdir release
          copy "src/Zipper-Man/bin/Release/Zipper-Man.exe" "release/"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Zipper-Man-exe
          path: release/Zipper-Man.exe
      
      - name: Create GitHub Release with Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Release Notes
            
            Release automatically generated by GitHub Actions.
            
            **Build Details:**
            - Commit: ${{ github.sha }}
            - Run ID: ${{ github.run_id }}
          files: release/Zipper-Man.exe
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
